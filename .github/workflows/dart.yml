name: Dart CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test bin benchmark

      - name: Analyze
        run: dart analyze

      - name: Test on VM
        run: dart test

      - name: Test public API on Chrome
        run: dart test -p chrome test/jpeg2000_public_api_test.dart

      - name: Benchmark smoke on VM
        run: dart run benchmark/codec_benchmark.dart

      - name: Compile benchmark to production JavaScript
        run: dart compile js -O2 -o build/codec_benchmark.js benchmark/codec_benchmark.dart
